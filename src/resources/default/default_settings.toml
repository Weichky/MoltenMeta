[log]
level = "info"
file_logging = false
enable_console = false

[appearance]
scheme = "light"
theme_mode = "light"
density_scale = -2

[locale]
language = "en"

[runtime]
python_version = "3.14"

[database]
db_type = "sqlite"
sqlite_path = "data/db/moltenmeta.mmdb"

[plot]
colorscheme = "default"
colorScheme = "follow"
color_algorithm = "linear"
lineStyle = "-"
marker = "o"
lineWidth = 2.0
markerSize = 6.0
grid = true
gridMode = "auto"
gridDensity = 1.0
fontSize = 12
bg = "#fafafa"
fg = "#323232"

[plot.scatter_3d]
default_coord_index = 0
xLabel = ""
yLabel = ""
zLabel = ""

[plot.contour_triangular]
height_factor = 0.8660254037844386
xlim = [-0.1, 1.1]
ylim = [-0.15, 1.0]
tick_positions = [0.2, 0.4, 0.6, 0.8]
tick_length = 0.02
elem_labels = ["A", "B", "C"]
colorbar_label = "Z_{ABC}"
levels = 20
alpha = 0.8
grid_alpha = 0.3
grid_line_width = 0.1