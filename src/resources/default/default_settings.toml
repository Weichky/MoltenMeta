[log]
level = "info"
file_logging = false
enable_console = false

[appearance]
theme = "blue"
scheme = "light"
theme_mode = "system"
enable_auto_dark_mode = true
density_scale = -3

[locale]
language = "en"

[runtime]
python_version = "3.14"

[database]
db_type = "sqlite"
sqlite_path = "data/db/moltenmeta.mmdb"

[plot]
colorscheme = "default"
color_algorithm = "linear"
colorScheme = "follow"
lineStyle = "-"
marker = "o"
lineWidth = 2.0
markerSize = 6.0
grid = true
gridMode = "auto"
gridDensity = 1.0
fontSize = 12