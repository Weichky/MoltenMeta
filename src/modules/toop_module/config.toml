[module]
package_name = "toop_module"
entry_class = "ToopCalc"
all_methods = ["calculateSingleProperty", "calculateScatter", "calculateContour"]

type = "simulation"
category = "geometric_model"
name = "Toop Module"
version = "1.0.0"
author = "Weichky"
license = "MIT"
description = "Toop model for predicting ternary thermodynamic properties from binary data"

[calculateSingleProperty.inputs]
symbol = ["elem_A", "elem_B", "elem_C", "x_B", "x_C", "Z_AB", "Z_AC", "Z_BC"]
input_method = "raw"

[calculateSingleProperty.inputs.raw]
method_map = [
    ["elem_A", "element_symbol_input"],
    ["elem_B", "element_symbol_input"],
    ["elem_C", "element_symbol_input"],
    ["x_B", "float_input"],
    ["x_C", "float_input"],
    ["Z_AB", "float_input"],
    ["Z_AC", "float_input"],
    ["Z_BC", "float_input"]
]

[calculateSingleProperty.inputs.latex]
elem_A = "elem_A"
elem_B = "elem_B"
elem_C = "elem_C"
x_B = "x_B"
x_C = "x_C"
Z_AB = "Z_{AB}"
Z_AC = "Z_{AC}"
Z_BC = "Z_{BC}"

[calculateSingleProperty.inputs.description]
elem_A = "Element A (solvent)"
elem_B = "Element B"
elem_C = "Element C"
x_B = "Mole fraction of B"
x_C = "Mole fraction of C"
Z_AB = "Binary property AB at x_A"
Z_AC = "Binary property AC at x_A"
Z_BC = "Binary property BC at x_B/(x_B+x_C)"

[calculateSingleProperty.inputs.unit]
elem_A = ""
elem_B = ""
elem_C = ""
x_B = ""
x_C = ""
Z_AB = ""
Z_AC = ""
Z_BC = ""

[calculateSingleProperty.outputs]
symbol = ["Z_ABC"]
can_be_used_as_input = true
is_collection = false
is_virtual = true

[calculateSingleProperty.outputs.latex]
Z_ABC = "Z_{ABC}"

[calculateSingleProperty.outputs.description]
Z_ABC = "Predicted ternary property"

[calculateSingleProperty.outputs.unit]


[calculateSingleProperty.plot]
plotType = "scatter_3d"
title = "{elem_A}-{elem_B}-{elem_C} System"
default_coord_index = 0

[calculateSingleProperty.plot.coords]
xLabel = "x_B"
yLabel = "x_C"
zLabel = "Z_{ABC}"

scatters = [
    {x = "x_A", y = "x_B", z = "Z_ABC"},
    {x = "x_A", y = "x_C", z = "Z_ABC"},
    {x = "x_B", y = "x_C", z = "Z_ABC"}
]

[calculateScatter.inputs]
symbol = ["elem_A", "elem_B", "elem_C", "n_points"]
input_method = "raw"

[calculateScatter.inputs.raw]
method_map = [
    ["elem_A", "element_symbol_input"],
    ["elem_B", "element_symbol_input"],
    ["elem_C", "element_symbol_input"],
    ["n_points", "int_input"]
]

[calculateScatter.inputs.latex]
elem_A = "elem_A"
elem_B = "elem_B"
elem_C = "elem_C"
n_points = "n_\\text{points}"

[calculateScatter.inputs.description]
elem_A = "Element A (solvent)"
elem_B = "Element B"
elem_C = "Element C"
n_points = "Number of points per edge"

[calculateScatter.inputs.unit]
elem_A = ""
elem_B = ""
elem_C = ""
n_points = ""

[calculateScatter.outputs]
symbol = ["Z_ABC"]
is_collection = true
is_virtual = true

[calculateScatter.outputs.latex]
Z_ABC = "Z_{ABC}"

[calculateScatter.outputs.description]
Z_ABC = "Predicted ternary property"

[calculateScatter.outputs.unit]


[calculateScatter.plot]
plotType = "scatter_3d"
title = "{elem_A}-{elem_B}-{elem_C} System"
default_coord_index = 2

[calculateScatter.plot.coords]
xLabel = "x_B"
yLabel = "x_C"

scatters = [
    {x = "x_A", y = "x_B", z = "Z_ABC"},
    {x = "x_A", y = "x_C", z = "Z_ABC"},
    {x = "x_B", y = "x_C", z = "Z_ABC"}
]

[calculateContour.inputs]
symbol = ["elem_A", "elem_B", "elem_C", "plane", "n_points"]
input_method = "raw"

[calculateContour.inputs.raw]
method_map = [
    ["elem_A", "element_symbol_input"],
    ["elem_B", "element_symbol_input"],
    ["elem_C", "element_symbol_input"],
    ["plane", "text_input"],
    ["n_points", "int_input"]
]

[calculateContour.inputs.latex]
elem_A = "elem_A"
elem_B = "elem_B"
elem_C = "elem_C"
plane = "plane"
n_points = "n_\\text{points}"

[calculateContour.inputs.description]
elem_A = "Element A (solvent)"
elem_B = "Element B"
elem_C = "Element C"
plane = "Projection plane (x_A-x_B, x_A-x_C, x_B-x_C)"
n_points = "Number of points per axis"

[calculateContour.inputs.unit]
elem_A = ""
elem_B = ""
elem_C = ""
plane = ""
n_points = ""

[calculateContour.outputs]
symbol = ["Z_ABC"]
is_collection = true
is_virtual = true

[calculateContour.outputs.latex]
Z_ABC = "Z_{ABC}"

[calculateContour.outputs.description]
Z_ABC = "Predicted ternary property"

[calculateContour.outputs.unit]


[calculateContour.plot]
plotType = "contour_triangular"
title = "{elem_A}-{elem_B}-{elem_C} System"
