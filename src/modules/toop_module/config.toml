[module]
package_name = "toop_module"
entry_class = "ToopCalc"
all_methods = ["calculateSingleProperty", "calculateScatter", "calculateContour"]

type = "simulation"
category = "ternary_thermodynamics"
name = "Toop Module"
version = "1.0.0"
author = "Weichky"
license = "MIT"
description = "Toop model for predicting ternary thermodynamic properties from binary data"

[calculateSingleProperty.inputs]
symbol = [
    "elem_A",
    "elem_B",
    "elem_C",
    "x_B",
    "x_C",
    "Z_AB",
    "Z_AC",
    "Z_BC"
]
latex = [
    "elem_A",
    "elem_B",
    "elem_C",
    "x_B",
    "x_C",
    "Z_{AB}",
    "Z_{AC}",
    "Z_{BC}"
]
description = [
    "Element A (solvent)",
    "Element B",
    "Element C",
    "Mole fraction of B",
    "Mole fraction of C",
    "Binary property AB at x_A",
    "Binary property AC at x_A",
    "Binary property BC at x_B/(x_B+x_C)"
]
unit = [
    "",
    "",
    "",
    "",
    "",
    "",
    "",
    ""
]

input_method = "raw"

raw.method_map = [
    ["elem_A", "element_symbol_input"],
    ["elem_B", "element_symbol_input"],
    ["elem_C", "element_symbol_input"],
    ["x_B", "float_input"],
    ["x_C", "float_input"],
    ["Z_AB", "float_input"],
    ["Z_AC", "float_input"],
    ["Z_BC", "float_input"]
]

[calculateSingleProperty.outputs]
symbol = [
    "Z_ABC"
]
latex = [
    "Z_{ABC}"
]
description = [
    "Predicted ternary property"
]
unit = [
    "kJ/mol"
]
can_be_used_as_input = true
is_collection = false

[calculateSingleProperty.plot]
plotType = "scatter_3d"
title = "{elem_A}-{elem_B}-{elem_C} System"

[calculateSingleProperty.plot.coords]
scatters = [
    {x = "x_A", y = "x_B", z = "Z_ABC"},
    {x = "x_A", y = "x_C", z = "Z_ABC"},
    {x = "x_B", y = "x_C", z = "Z_ABC"}
]

[calculateScatter.inputs]
symbol = [
    "elem_A",
    "elem_B",
    "elem_C",
    "n_points"
]
latex = [
    "elem_A",
    "elem_B",
    "elem_C",
    "n_\\text{points}"
]
description = [
    "Element A (solvent)",
    "Element B",
    "Element C",
    "Number of points per edge"
]
unit = [
    "",
    "",
    "",
    ""
]

input_method = "raw"

raw.method_map = [
    ["elem_A", "element_symbol_input"],
    ["elem_B", "element_symbol_input"],
    ["elem_C", "element_symbol_input"],
    ["n_points", "int_input"]
]

[calculateScatter.outputs]
symbol = [
    "Z_ABC"
]
latex = [
    "Z_{ABC}"
]
description = [
    "Predicted ternary property"
]
unit = [
    "kJ/mol"
]
is_collection = true

[calculateScatter.plot]
plotType = "scatter_3d"
title = "{elem_A}-{elem_B}-{elem_C} System"

[calculateScatter.plot.coords]
scatters = [
    {x = "x_A", y = "x_B", z = "Z_ABC"},
    {x = "x_A", y = "x_C", z = "Z_ABC"},
    {x = "x_B", y = "x_C", z = "Z_ABC"}
]

[calculateContour.inputs]
symbol = [
    "elem_A",
    "elem_B",
    "elem_C",
    "plane",
    "n_points"
]
latex = [
    "elem_A",
    "elem_B",
    "elem_C",
    "plane",
    "n_\\text{points}"
]
description = [
    "Element A (solvent)",
    "Element B",
    "Element C",
    "Projection plane (x_A-x_B, x_A-x_C, x_B-x_C)",
    "Number of points per axis"
]
unit = [
    "",
    "",
    "",
    "",
    ""
]

input_method = "raw"

raw.method_map = [
    ["elem_A", "element_symbol_input"],
    ["elem_B", "element_symbol_input"],
    ["elem_C", "element_symbol_input"],
    ["plane", "text_input"],
    ["n_points", "int_input"]
]

[calculateContour.outputs]
symbol = [
    "Z_ABC"
]
latex = [
    "Z_{ABC}"
]
description = [
    "Predicted ternary property"
]
unit = [
    "kJ/mol"
]
is_collection = true

[calculateContour.plot]
plotType = "contour_triangular"
title = "{elem_A}-{elem_B}-{elem_C} System"
