# Miedema Module Info
# This module is also an official example of how to create a module for MoltenMeta.
# For more information, please refer to our official documentation.

[module]
package_name = "miedema_module"
entry_class = "MiedemaCalc"
all_methods = [
    "calculateSingle",
    "calculateRange"
]

type = "simulation"
category = "enthalpy_of_mixing"
name = "Miedema Module"
version = "1.0.0"
author = "Weichky"
license = "MIT"
description = "Miedema module for calculating enthalpy of mixing"

[data]
csv = "miedema_element_properties.csv"
save_to_database = true
table_name = "miedema_element_properties"
columns = [
    "element_id",
    "is_transition_metal",
    "n_ws_13",
    "phi",
    "v_23",
    "mu",
    "r_over_p"
]

[calculateSingle.inputs]
symbol = ["elem_A", "elem_B", "x_A"]
input_method = "composition_tool"

[calculateSingle.inputs.composition_tool]
mode = "mole_fraction"
max_components = 2
map = [
    ["elem_A", 0],
    ["elem_B", 2],
    ["x_A", 1]
]

[calculateSingle.inputs.latex]
elem_A = "elem_A"
elem_B = "elem_B"
x_A = "x_A"

[calculateSingle.inputs.description]
elem_A = "Element A's id (element number in the periodic table)"
elem_B = "Element B's id (element number in the periodic table)"
x_A = "Mole fraction of element A"

[calculateSingle.inputs.unit]
elem_A = ""
elem_B = ""
x_A = ""

[calculateSingle.outputs]
symbol = ["Delta_H_mix"]
can_be_used_as_input = true
is_collection = false

[calculateSingle.outputs.latex]
Delta_H_mix = "\\Delta H_{mix}"

[calculateSingle.outputs.description]
Delta_H_mix = "Enthalpy of mixing"

[calculateSingle.outputs.unit]
Delta_H_mix = "kJ/mol"

[calculateSingle.plot]
plotType = "scatter_2d"
title = "Enthalpy of Mixing"

[calculateSingle.plot.coords]
x = "x_A"
y = ["Delta_H_mix"]

[calculateRange.inputs]
symbol = ["elem_A", "elem_B", "x_A_start", "x_A_end", "n_points"]
input_method = "raw"

[calculateRange.inputs.raw]
method_map = [
    ["elem_A", "element_symbol_input"],
    ["elem_B", "element_symbol_input"],
    ["x_A_start", "float_input"],
    ["x_A_end", "float_input"],
    ["n_points", "int_input"]
]

[calculateRange.inputs.latex]
elem_A = "elem_A"
elem_B = "elem_B"
x_A = "x_A"
x_A_start = "x^\\text{start}_A"
x_A_end = "x^\\text{end}_A"
n_points = "n_\\text{points}"

[calculateRange.inputs.description]
elem_A = "Element A's symbol (e.g. Al, Si)"
elem_B = "Element B's symbol (e.g. Al, Si)"
x_A_start = "Starting mole fraction of element A"
x_A_end = "Ending mole fraction of element A"
n_points = "Number of points"

[calculateRange.inputs.unit]
elem_A = ""
elem_B = ""
x_A_start = ""
x_A_end = ""
n_points = ""

[calculateRange.outputs]
symbol = ["Delta_H_mix"]
can_be_used_as_input = true
is_collection = true

[calculateRange.outputs.latex]
Delta_H_mix = "\\Delta H_{mix}"

[calculateRange.outputs.description]
Delta_H_mix = "Enthalpy of mixing"

[calculateRange.outputs.unit]
Delta_H_mix = "kJ/mol"

[calculateRange.plot]
plotType = "line_2d"
title = "Enthalpy of Mixing vs Composition"

[calculateRange.plot.coords]
x = "x_A"
y = ["Delta_H_mix"]

[calculateSingleBatch]
# Internal method for batch processing, not exposed to UI
# Used by other modules via Provider pattern

[calculateSingleBatch.inputs]
symbol = ["elem_A", "elem_B", "x_array"]

[calculateSingleBatch.outputs]
symbol = ["Delta_H_mix"]
tags = ["toop", "binary_data"]

[calculateSingleBatch.outputs.latex]
Delta_H_mix = "\\Delta H_{mix}"

[calculateSingleBatch.outputs.unit]
Delta_H_mix = "kJ/mol"
